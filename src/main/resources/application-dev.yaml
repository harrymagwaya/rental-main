server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: rentalmain

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  docker:
    compose:
      enabled: false

app:
  security:
    system-secret: ${SYSTEM_SECRET}
    jwt:
      secret: ${SYSTEM_SECRET}
      expiration: ${JWT_EXPIRATION:9000000}

      spring:
        datasource:
          url: jdbc:mysql://${DB_HOST:mysql}:3306/${DB_NAME:rentalMain}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
          username: ${DB_USER}
          password: ${DB_PASSWORD}
          driver-class-name: com.mysql.cj.jdbc.Driver

        jpa:
          hibernate:
            ddl-auto: update
          show-sql: false
          properties:
            hibernate:
              dialect: org.hibernate.dialect.MySQLDialect
              format_sql: false

        data:
          redis:
            host: ${REDIS_HOST:redis}
            port: ${REDIS_PORT:6379}

        mail:
          host: ${MAIL_HOST}
          port: ${MAIL_PORT}
          username: ${MAIL_USER}
          password: ${MAIL_PASS}
          properties:
            mail:
              smtp:
                auth: true
                starttls:
                  enable: true

      management:
        endpoints:
          web:
            exposure:
              include: "health,info"
        endpoint:
          health:
            show-details: never

      logging:
        level:
          root: info
          com.xpro.rentalmain: info
          org.springframework.web: warn
          org.springframework.security: warn
          org.springframework.orm.jpa: warn
          org.hibernate.orm.jdbc.bind: off