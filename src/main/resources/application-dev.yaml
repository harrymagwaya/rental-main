server:
  port: ${SERVER_PORT}

spring:
  application:
    name: rentalmain

  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO}
    show-sql: ${JPA_SHOW_SQL}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: ${HIBERNATE_FORMAT_SQL}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS}
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS}

logging:
  level:
    root: ${LOG_LEVEL_ROOT}
    com.xpro.rentalmain: ${LOG_LEVEL_APP}
    org.springframework.web: ${LOG_LEVEL_WEB}
    org.springframework.security: ${LOG_LEVEL_SECURITY}
    org.springframework.orm.jpa: ${LOG_LEVEL_JPA}
    org.hibernate.orm.jdbc.bind: ${LOG_LEVEL_HIBERNATE_BIND}

app:
  security:
    system-secret: ${SYSTEM_SECRET}
    jwt:
      secret: ${SYSTEM_SECRET}
      expiration: ${JWT_EXPIRATION}