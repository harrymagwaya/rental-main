spring:
  application:
    name: rentalmain

  # --- DATABASE CONFIGURATION ---
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/rentalMain?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

#  # --- MAIL CONFIGURATION ---
#  mail:
#    host: ${MAIL_HOST}
#    port: ${MAIL_PORT}
#    username: ${MAIL_USER}
#    password: ${MAIL_PASS}
#    properties:
#      mail:
#        smtp:
#          auth: true
#          starttls:
#            enable: true

  # --- ASYNC & DOCKER ---
  docker:
    compose:
      enabled: false
  task:
    execution:
      pool:
        core-size: 2
        max-size: 5

# --- MANAGEMENT & MONITORING (Actuator) ---
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus,mappings" # 'mappings' shows all registered routes
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# --- LOGGING ---
logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
  level:
    root: info
    com.xpro.rentalmain: debug # Your specific project logs
    org.springframework.web: debug
    org.springframework.security: debug
    org.springframework.orm.jpa: debug
    org.hibernate.orm.jdbc.bind: trace


app:
  security:
    system-secret: ${SYSTEM_SECRET}
    jwt:
      secret: ${SYSTEM_SECRET}
      expiration: 9000000