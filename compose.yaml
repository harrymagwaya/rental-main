services:
  db:
    image: mysql:8.0
    container_name: rental-db
    restart: always
    environment:
      MYSQL_DATABASE: rentalMain
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - rental_db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  # --- NEW REDIS SERVICE ---
  redis:
    image: redis:7-alpine
    container_name: rental-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: rental-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=db
      - DB_USER=myuser
      - DB_PASSWORD=mypassword
      # --- ADD THESE FOR REDIS ---
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SYSTEM_SECRET=${SYSTEM_SECRET}
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}

volumes:
  rental_db_data: