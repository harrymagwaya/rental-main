services:
  db:
    image: mysql:8.0
    container_name: rental-db
    restart: always
    environment:
      MYSQL_DATABASE: rentalMain
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - rental_db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: rental-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # These match your application.yml placeholders exactly
      - DB_HOST=db
      - DB_USER=myuser
      - DB_PASSWORD=mypassword
      - SYSTEM_SECRET=${SYSTEM_SECRET}
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}

volumes:
  rental_db_data: