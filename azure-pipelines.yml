trigger:
  branches:
    include:
      - deploy-test

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: SSH@0
    inputs:
      sshEndpoint: 'RentalVMConnection'
      runOptions: 'commands'
      commands: |
        set -e

        cd /home/magwayaVM/apps/rental-main

        echo "Pulling deploy-test branch..."
        git fetch origin deploy-test
        git checkout deploy-test
        git reset --hard origin/deploy-test

        echo "Rebuilding Docker containers..."
        docker compose down
        docker compose up -d --build

        echo "Cleaning unused Docker images..."
        docker image prune -f

        echo "Running containers:"
        docker ps

        echo "Deployment complete."
      readyTimeout: '20000'